<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogTracer - 日志分析挑战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- ===== 开始界面 ===== -->
    <div id="start-screen" class="screen active">
      <div class="start-content" style="text-align:center;">
        <div class="logo-icon">🔍</div>
        <h1>LogTracer</h1>
        <p class="tagline">日志分析挑战</p>
        <p class="sub">
          扮演 SOC 分析师，从海量日志中发现攻击痕迹<br>
          分析 SSH 暴力破解、SQL 注入、WebShell、DDoS、横向移动、数据外泄等真实攻击场景
        </p>
        <button id="start-btn" class="btn primary">开始分析</button>
      </div>
    </div>

    <!-- ===== 关卡选择 ===== -->
    <div id="levels-screen" class="screen">
      <header>
        <h2>🔍 选择案件</h2>
        <div class="header-stats">
          <span>🏆 总分: <strong id="total-score">0</strong></span>
        </div>
      </header>
      <div id="level-grid"></div>
    </div>

    <!-- ===== 游戏界面 ===== -->
    <div id="game-screen" class="screen">
      <header>
        <button id="back-btn" class="btn sm">← 返回</button>
        <span id="level-title"></span>
        <span id="level-difficulty"></span>
      </header>

      <!-- 日志区域 -->
      <div class="log-section">
        <button id="show-logs-btn">📋 展开日志 ▼</button>
        <div id="log-area" class="collapsed">
          <div id="log-content"></div>
        </div>
      </div>

      <!-- 题目区域 -->
      <div class="question-section">
        <div id="question-progress"></div>
        <div id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div id="feedback-box" class="feedback-box hidden"></div>
        <div class="game-actions">
          <button id="submit-btn" class="btn primary">提交答案</button>
          <button id="next-btn" class="btn primary" style="display:none;">下一题 →</button>
        </div>
      </div>
    </div>

    <!-- ===== 关卡完成弹窗 ===== -->
    <div id="level-complete" class="modal-overlay hidden">
      <div class="modal-box">
        <h2 id="complete-title"></h2>
        <p id="complete-msg"></p>
        <div id="complete-stars"></div>
        <div class="knowledge-card">
          <div class="knowledge-title" id="knowledge-title"></div>
          <div class="knowledge-body" id="knowledge-body"></div>
        </div>
        <div class="modal-btns">
          <button id="replay-btn" class="btn">重新挑战</button>
          <button id="next-level-btn" class="btn primary">下一关 →</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
